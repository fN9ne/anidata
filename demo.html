<!doctype html>
<html lang="ru">
	<head>
	<meta charset="utf-8">
	<meta http-equiv="X-UA-Compatible" content="IE=edge">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<link rel="icon" href="img/favicon/favicon.ico">
	<link rel="icon" href="img/favicon/favicon.svg" type="image/svg+xml">
	<link rel="apple-touch-icon" href="img/favicon/favicon_apple.png">
	<link rel="manifest" href="files/manifest.webmanifest">
	<link rel="stylesheet" href="css/style.min.css">
	<title>Demo</title>
	<link href="https://fonts.googleapis.com/css?family=Mulish:200,300,regular,500,600,700,800,900,200italic,300italic,italic,500italic,600italic,700italic,800italic,900italic" rel="stylesheet" />
	<link href="https://fonts.googleapis.com/css?family=Sulphur+Point:300,regular,700" rel="stylesheet">
</head>
	<body>
		<div class="wrapper">
			<main class="page">
				<input type="text" placeholder="https://" class="input">
				<div class="radio-buttons">
					<div class="radio-buttons__item">
						<input type="radio" class="radio-buttons__input" checked>
						<span class="radio-buttons__text">URL</span>
					</div>
					<div class="radio-buttons__item">
						<input type="radio" class="radio-buttons__input">
						<span class="radio-buttons__text">File</span>
					</div>
				</div>
				<div class="checkboxes">
					<div class="checkboxes__item">
						<input type="checkbox" class="checkboxes__input">
						<span class="checkboxes__text">Watched</span>
						<div class="checkboxes__label"></div>
					</div>
					<div class="checkboxes__item">
						<input type="checkbox" class="checkboxes__input">
						<span class="checkboxes__text">In progress</span>
						<div class="checkboxes__label"></div>
					</div>
					<div class="checkboxes__item">
						<input type="checkbox" class="checkboxes__input">
						<span class="checkboxes__text">Want to see</span>
						<div class="checkboxes__label"></div>
					</div>
				</div>
				<button class="button">New</button>
				<div class="select">
					<div class="select__header">
						<div class="select__current">Status</div>
						<div class="select__icon">
							<svg width="17" height="10" viewBox="0 0 17 10" fill="none" xmlns="http://www.w3.org/2000/svg">
								<path
									d="M8.49934 10C8.13687 10 7.77422 9.86049 7.49798 9.58147L0.415017 2.43862C-0.138339 1.88058 -0.138339 0.976562 0.415017 0.418527C0.968374 -0.139509 1.86481 -0.139509 2.41817 0.418527L8.49934 6.55357L14.5818 0.419643C15.1352 -0.138393 16.0316 -0.138393 16.585 0.419643C17.1383 0.977678 17.1383 1.8817 16.585 2.43973L9.50202 9.58259C9.22534 9.86161 8.86234 10 8.49934 10Z"
									fill="#7D7D7D" />
							</svg>
						</div>
					</div>
					<div class="select__body">
						<div class="select__item select__item_viewed" value="viewed">
							<div class="select__text">Viewed</div>
						</div>
						<div class="select__item select__item_started" value="started">
							<div class="select__text">Started</div>
						</div>
						<div class="select__item select__item_want-to-see" value="want-to-see">
							<div class="select__text">Want to see</div>
						</div>
					</div>
				</div>
			</main>
		</div>
		<script src="js/app.min.js"></script>
	</body>
</html>
